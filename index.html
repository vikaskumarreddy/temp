<!DOCTYPE html>
<html>
<head>
  <title>Spring Actuator Bean Visualizer</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    body { font-family: Arial; }
    #network { width: 100%; height: 90vh; border: 1px solid #ccc; }
  </style>
</head>
<body>

<h2>Spring Boot Bean Dependency Visualizer</h2>
<button onclick="loadBeans()">Load Beans</button>
<div id="network"></div>

<script>
async function loadBeans() {
  const response = await fetch('http://localhost:8090/actuator/beans');
  const data = await response.json();

  const nodes = [];
  const edges = [];

  const contexts = data.contexts;
  for (const ctx in contexts) {
    const beans = contexts[ctx].beans;

    for (const beanName in beans) {
      nodes.push({ id: beanName, label: beanName });

      const deps = beans[beanName].dependencies || [];
      deps.forEach(dep => {
        edges.push({ from: beanName, to: dep });
      });
    }
  }

  const container = document.getElementById('network');
  const networkData = {
    nodes: new vis.DataSet(nodes),
    edges: new vis.DataSet(edges)
  };

  const options = {
    layout: { improvedLayout: true },
    physics: { stabilization: true },
    nodes: { shape: 'dot', size: 10 }
  };

  new vis.Network(container, networkData, options);
}
</script>

</body>
</html>
